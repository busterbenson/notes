# Internal Okayness — tree of themes, boards, and sub-boards.
#
# Each node has a stable `id` (never rename; change `name` for display).
# Ratings attach to ids, so boards can be renamed without losing history.
#
# Scoring:
#   resilience_days — EWMA half-life for this board's own ratings.
#     Low = reactive; high = slow-moving. Defaults below are seeds.
#   children — if present, the board's effective score is a blend of its
#     children's scores combined with its own direct ratings. The default
#     blender is `weighted_mean` with `parent_weight: 0` (children-only) and
#     each child equally weighted. Tune per board as needed.
#   sub_dials — optional nested layer below a board (same fields as a board:
#     id, name, god_anchor, note, resilience_days). Salience-as-hierarchy
#     means deeper = less-salient. Sub_dials don't currently have ratings of
#     their own; they exist to render the GOD-IOD partial-adoption structure.
#
# IOD-as-superset model (see wiki: internal-okayness-dashboard):
#   god_anchor — optional id of the GOD node this IOD board/sub-dial maps to.
#     The id scheme is defined on the GOD wiki page under "GOD id scheme
#     (stable anchors for IOD links)" — slugs like `wars/hormuz`,
#     `ai-tech/capability`, `media-epistemics/algorithmic-timeline`. Personal-
#     only boards (Self theme, Career, Projects, Basic Needs, the named-people
#     Social boards) do NOT carry a god_anchor and do not need one — they
#     measure this bell, not a planetary phenomenon.
#
# The 0–7 scale:
#   7 Great · 6 Good · 5 Okay · 4 Neutral · 3 Not Okay · 2 Bad · 1 Terrible · 0 Numb

themes:
  - id: self
    name: Self
    children:
      # Personal-only — Self theme is internal instruments. No god_anchor.
      - { id: self-health, name: Health, resilience_days: 14 }
      - { id: self-therapy, name: Therapy, resilience_days: 60 }
      - { id: self-psychedelics, name: Psychedelics, resilience_days: 60 }
      - { id: self-spirituality, name: Spirituality, resilience_days: 60 }
      - id: self-channel-hygiene
        name: Channel Hygiene
        resilience_days: 30
        # Channel Hygiene is the *operational status* of Buster's relationship
        # to the GOD's media/epistemics field. Whole-board link.
        god_anchor: media-epistemics
      - { id: self-aliveness, name: Aliveness, resilience_days: 30 }

  - id: career
    name: Career
    children:
      - id: career-inkitt
        name: Inkitt
        resilience_days: 30
        # Career boards fragment from the GOD's markets board (AI labor
        # displacement is the dominant projection for Inkitt).
        god_anchor: markets/ai-labor
      - id: career-750
        name: "750 Words"
        resilience_days: 30
        # 750 Words sits on the SaaS canary dial primarily.
        god_anchor: markets/saas

  - id: social
    name: Social & Relationships
    children:
      # Personal-only — named individuals are this bell's relationships.
      - { id: social-sarah, name: Sarah, resilience_days: 14 }
      - { id: social-niko, name: Niko, resilience_days: 14 }
      - { id: social-louie, name: Louie, resilience_days: 14 }
      - id: social-friends
        name: Friends
        resilience_days: 30
        # Friends + Community couple to the GOD's social-fabric board, often
        # counter-coupled (IOD bright partly because GOD reads dark).
        god_anchor: social-fabric
      - id: social-community
        name: Community
        resilience_days: 30
        god_anchor: social-fabric

  - id: projects
    name: Projects & Plans
    children:
      - id: projects-chalant
        name: Chalant
        resilience_days: 30
        # Chalant runs on the substrate the GOD's AI capability dial tracks.
        god_anchor: ai-tech/capability
      # Personal-only — Dilemma (book) and Norway (place/pilgrimage) are
      # this-bell-only.
      - { id: projects-dilemma, name: Dilemma, resilience_days: 30 }
      - { id: projects-norway, name: Norway, resilience_days: 30 }

  - id: basic-needs
    name: Basic Needs
    children:
      - id: basic-needs-budget
        name: Budget & Spending
        resilience_days: 30
        # Cashflow is partly company-specific and partly absorbing the GOD's
        # macro-economy reading via cost-of-living.
        god_anchor: markets/macro
      - id: basic-needs-investments
        name: Investments
        resilience_days: 60
        god_anchor: markets/macro
      # Home is personal-only — Sala House specifically. The civilizational-
      # fragility coupling is real but the dial measures *this place*.
      - { id: basic-needs-home, name: Home, resilience_days: 30 }

  - id: world
    name: World
    children:
      - id: world-ai
        name: AI
        resilience_days: 60
        # World/AI is the field-shape question — capability + alignment.
        god_anchor: ai-tech
        sub_dials:
          - { id: world-ai-capability, name: Capability trajectory, god_anchor: ai-tech/capability }
          - { id: world-ai-alignment, name: Alignment / safety, god_anchor: ai-tech/alignment }
          - { id: world-ai-consciousness, name: Cognitive ecology, god_anchor: ai-tech/consciousness }
      - id: world-politics
        name: Politics
        resilience_days: 60
        god_anchor: politics
        sub_dials:
          - { id: world-politics-democracy, name: US democracy / rule of law, god_anchor: politics/democracy }
          - { id: world-politics-executive, name: Executive overreach, god_anchor: politics/executive-overreach }
          - { id: world-politics-courts, name: Court legitimacy, god_anchor: politics/courts }
      - id: world-war
        name: War
        resilience_days: 60
        god_anchor: wars
        sub_dials:
          - { id: world-war-hormuz, name: Hormuz / US-Iran, god_anchor: wars/hormuz }
          - { id: world-war-gaza, name: Gaza, god_anchor: wars/gaza }
          - { id: world-war-long-tails, name: Ukraine / Sudan / long tails, god_anchor: wars/long-tails }
      - id: world-environment
        name: Environment
        resilience_days: 60
        god_anchor: climate
        sub_dials:
          - { id: world-environment-slow, name: Slow climate, god_anchor: climate/slow }
          - { id: world-environment-acute, name: Acute climate, god_anchor: climate/acute }
          - { id: world-environment-biosphere, name: Biosphere, god_anchor: climate/biosphere }
      - id: world-power-concentration
        name: Power Concentration
        resilience_days: 60
        god_anchor: power-concentration
        sub_dials:
          - { id: world-power-billionaires, name: Billionaire-scale influence, god_anchor: power-concentration/billionaires }
          - { id: world-power-ai-labs, name: AI lab consolidation, god_anchor: power-concentration/ai-labs }
          - { id: world-power-regulatory, name: Regulatory capture, god_anchor: power-concentration/regulatory-capture }
      - id: world-longnow
        name: Long-now
        resilience_days: 60
        god_anchor: long-now
        sub_dials:
          - { id: world-longnow-fragility, name: Civilizational fragility, god_anchor: long-now/fragility }
          - { id: world-longnow-intergenerational, name: Intergenerational ethics, god_anchor: long-now/intergenerational }
          - { id: world-longnow-agi, name: AGI timeline, god_anchor: long-now/agi-timeline }

# Off-dashboard — GOD nodes with no IOD presence (or only fragmentary presence).
#
# These are NOT rated. The hierarchy of the live themes above IS Buster's
# salience function; depth = inverse top-of-mind-ness. Entries here are
# *named absences* — projection from GOD to IOD that didn't take.
#
# Schema choice (post-2026-04-23 unification): the GOD tree is now a single
# theme-organized hierarchy with `bubble:` and `vantages:` as node properties
# instead of a structural `outside/<vantage>/<dial>` prefix. The off_dashboard
# entries below remain a *curated, vantage-labeled* list — the off_dashboard
# schema retains the vantage groupings even though god_tree.yml no longer
# structures by vantage. Each entry now references the new theme-based ids;
# the `vantage:` field labels the group it belongs to (national-security,
# electorate, rural, religious, gen-z, older-adults, immigrant, parents).
#
# status:
#   never-cared — never installed on the dashboard. No engagement. The default
#                 stance toward most planetary dials.
#   numb        — was installed, the transducer stopped reading. The needle
#                 sits at the dark dot. Engagement-with-numbness is its own
#                 stance, distinct from never-cared.
#   partial     — some sub-dial(s) absorbed by an IOD board, but the vantage's
#                 dials are not installed in full. `partial_into` lists the
#                 IOD board ids that carry the fragment.
#
# Each entry references the GOD theme it's projecting from via `god_anchor`
# (a theme-level id like `geopolitical-infrastructure`, or a specific dial id
# like `social-fabric/dechurching`). `god_section` is the anchor-style
# reference to the wiki section (kept for direct link rendering).
off_dashboard:
  - id: god-national-security-vantage
    name: Government / national-security vantage
    vantage: national-security
    status: never-cared
    god_anchor: geopolitical-infrastructure
    god_section: "global-okayness-dashboard#Theme: Geopolitical Infrastructure"
    note: "Vantage mismatch — Buster doesn't work in or adjacent to national security. Filtered into Politics + Investments via second-order effects. Dials in this vantage now live under the Geopolitical Infrastructure theme; the cross-cutting biosecurity / nuclear / undersea-cable / dollar / supply-chain / rare-earth / near-peer / intelligence dials are present in the GOD but unlinked to any IOD board."

  - id: god-rural-working-class-vantage
    name: Rural / working-class vantage
    vantage: rural
    status: never-cared
    god_anchor: markets/manufacturing
    god_section: "global-okayness-dashboard#Theme: Markets and Economy"
    note: "Geographic and class-position mismatch. Appropriate absence. Dials in this vantage (manufacturing, opioid recovery, school consolidation, agriculture, rural healthcare) now live across Markets, Health and Care, Education and the Next Generation themes — none currently linked to an IOD board."

  - id: god-religious-communities-vantage
    name: Religious communities vantage
    vantage: religious
    status: never-cared
    god_anchor: social-fabric/dechurching
    god_section: "global-okayness-dashboard#Theme: Social Fabric"
    note: "Spirituality is named as personal practice. The institutional dials don't fit Buster's actual relationship to religion. Religious-vantage dials (dechurching, religious liberty, persecution abroad, antisemitism / anti-Muslim, faith and family formation) now live across Social Fabric and Politics themes."

  - id: god-immigrant-first-gen-vantage
    name: Immigrant / first-generation vantage
    vantage: immigrant
    status: never-cared
    god_anchor: politics/deportation-enforcement
    god_section: "global-okayness-dashboard#Theme: Politics and Governance"
    note: "Status mismatch. Immigrant-vantage dials (deportation / enforcement, family separation, remittances, foreign policy effects on home country, naturalization / asylum backlog) now live across Politics, Markets, and Wars themes."

  - id: god-older-adults-vantage
    name: Older-adults vantage
    vantage: older-adults
    status: never-cared
    god_anchor: health-care/eldercare
    god_section: "global-okayness-dashboard#Theme: Health and Care"
    note: "Near-future Buster dials (eldercare, cognitive decline, Medicare / Social Security solvency, retirement-asset adequacy, loneliness in old age). Not yet across the would-actually-rate-it threshold. Now distributed across Health and Care, Markets, Social Fabric themes."

  - id: god-electorate-vantage
    name: US electorate priorities
    vantage: electorate
    status: partial
    god_anchor: politics/threats-to-democracy
    god_section: "global-okayness-dashboard#Theme: Politics and Governance"
    partial_into: [basic-needs-budget, basic-needs-home, world-politics, world-war]
    note: "Cost-of-living (markets/cost-of-living) lands on Budget; housing (markets/housing) on Home; threats-to-democracy (politics/threats-to-democracy) on Politics; foreign policy / wars (wars/electorate-foreign-policy) on War. Crime, abortion, education, addiction, civil rights, religious liberty, guns, immigration enforcement — all electorate-vantage dials in the GOD that have no IOD presence."

  - id: god-gen-z-vantage
    name: Gen Z / 20-somethings vantage
    vantage: gen-z
    status: partial
    god_anchor: ai-tech/entry-level
    god_section: "global-okayness-dashboard#Theme: AI and Technology"
    partial_into: [social-niko, social-louie, world-environment, world-ai]
    note: "Climate-induced family-planning anxiety (climate/family-planning-anxiety) lands on Environment + Niko/Louie; AI entry-level labor displacement (ai-tech/entry-level) on AI; cohort mental-health (social-fabric/youth-mental-health-cohort) partial via the kid boards. Housing acuteness (markets/housing) and dating-economy collapse (social-fabric/dating-economy) are absent."

  - id: god-parents-school-age-vantage
    name: Parents-of-school-aged-kids vantage
    vantage: parents
    status: partial
    god_anchor: education-next-generation
    god_section: "global-okayness-dashboard#Theme: Education and the Next Generation"
    partial_into: [social-niko, social-louie]
    note: "School safety, cell-phone-in-school, screen time, learning loss, youth mental health (parental view), college cost — all absorbed by the named-kid boards rather than tracked as their own dial set. The Education and the Next Generation theme now exists in the GOD; the IOD has not yet promoted any of its dials to first-class boards."

# Per-board blending overrides. Defaults are fine if you don't list a board.
# blending:
#   "self":
#     parent_weight: 0.2        # 20% from parent's own direct ratings, 80% from children
#     child_weights:             # non-equal child weights
#       self-health: 2
#       self-therapy: 1
