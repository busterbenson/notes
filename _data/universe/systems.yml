# Systems through time — data for Chart 2.
#
# Each entry is a SYSTEM (not a single object): a population, a
# species, a class of artifact, a movement. Each carries a trajectory
# of (time_ya, total_mass_kg, label) waypoints showing how the system
# grew/shrank in TOTAL MASS through deep time.
#
# Mass numbers are order-of-magnitude. Real biosphere/population
# figures vary; sources cited per system. The point of the chart is
# the SHAPE of growth, not the precise value at any one moment.
#
# Schema per system:
#   id, name, category, color, blurb
#   trajectory: [{time_ya, mass_kg, label}, ...]   # most-past first
#     time_ya  — years before present (negative = future)
#     mass_kg  — total mass of the system at that moment
#     label    — short milestone description (shows in tooltip)
#   prominence: 1-3 (1 = always visible, 3 = needs zoom)
#   sources: [tags from sources.yml]

systems:

# ─── Life and biology ────────────────────────────────────────────────
  - id: biosphere
    name: Life on Earth (biosphere)
    category: biology
    color: "#3fa648"
    prominence: 1
    blurb: "Total mass of all living things on Earth — bacteria, plants, fungi, animals, the lot. Today ≈ 1.1 × 10¹⁵ kg, ~85% of which is plants."
    trajectory:
      - { time_ya: 3.7e9,  mass_kg: 1.0e6,  label: "First cells (LUCA's descendants)" }
      - { time_ya: 2.4e9,  mass_kg: 1.0e10, label: "Great Oxygenation — cyanobacteria fill the oceans" }
      - { time_ya: 1.5e9,  mass_kg: 1.0e12, label: "Eukaryotes diversify" }
      - { time_ya: 540e6,  mass_kg: 1.0e14, label: "Cambrian explosion — animals everywhere" }
      - { time_ya: 350e6,  mass_kg: 5.0e14, label: "First forests cover the continents" }
      - { time_ya: 252e6,  mass_kg: 5.0e13, label: "End-Permian — ~95% of marine species gone" }
      - { time_ya: 100e6,  mass_kg: 5.0e14, label: "Mid-Cretaceous — dinosaurs and flowering plants" }
      - { time_ya: 66e6,   mass_kg: 2.0e14, label: "Chicxulub impact — mammals inherit the rebuild" }
      - { time_ya: 0,      mass_kg: 1.1e15, label: "Today — ~85% plants, 13% bacteria, 2% everything else" }
    sources: [bar-on-2018-biomass]

  - id: plants
    name: Plants (photosynthesizers)
    category: biology
    color: "#7fba61"
    prominence: 2
    blurb: "Land plants alone hold ~450 Gt of carbon, making them the largest single kingdom by mass."
    trajectory:
      - { time_ya: 470e6,  mass_kg: 1.0e11, label: "First land plants colonize from freshwater algae" }
      - { time_ya: 350e6,  mass_kg: 1.0e14, label: "Carboniferous coal-forest peak" }
      - { time_ya: 100e6,  mass_kg: 5.0e14, label: "Flowering plants take over" }
      - { time_ya: 0,      mass_kg: 9.0e14, label: "Today — 450 Gt C of land plants" }
    sources: [bar-on-2018-biomass]

  - id: animals
    name: Animals (metazoans)
    category: biology
    color: "#b03a36"
    prominence: 2
    blurb: "All multicellular animals — fish, insects, mammals, you. Today ≈ 4 Gt C, dominated by arthropods and fish."
    trajectory:
      - { time_ya: 580e6,  mass_kg: 1.0e9,  label: "First Ediacaran soft-bodied animals" }
      - { time_ya: 540e6,  mass_kg: 1.0e11, label: "Cambrian explosion — every body plan invented at once" }
      - { time_ya: 250e6,  mass_kg: 1.0e12, label: "End-Permian dieback" }
      - { time_ya: 66e6,   mass_kg: 5.0e12, label: "K-Pg extinction — dinosaurs out, mammals' rise begins" }
      - { time_ya: 0,      mass_kg: 8.0e12, label: "Today — 4 Gt C, half arthropods + fish" }
    sources: [bar-on-2018-biomass]

  - id: humans
    name: Humans (Homo sapiens)
    category: people
    color: "#2d6db0"
    prominence: 1
    blurb: "Total wet mass of all living humans. Today ≈ 5 × 10¹¹ kg, doubled in your lifetime, projected to plateau around 10 billion mid-century."
    trajectory:
      - { time_ya: 300e3,  mass_kg: 5.0e5,  label: "Anatomically modern humans appear (~10,000 individuals)" }
      - { time_ya: 70e3,   mass_kg: 5.0e6,  label: "Out-of-Africa expansion (~100,000 individuals)" }
      - { time_ya: 12e3,   mass_kg: 2.5e8,  label: "Agricultural revolution (~5 million people)" }
      - { time_ya: 2000,   mass_kg: 1.0e10, label: "1 CE (~200 million people)" }
      - { time_ya: 320,    mass_kg: 3.0e10, label: "1700 CE (~600 million)" }
      - { time_ya: 125,    mass_kg: 9.0e10, label: "1900 CE (~1.6 billion)" }
      - { time_ya: 25,     mass_kg: 3.7e11, label: "2000 CE (~6.1 billion)" }
      - { time_ya: 0,      mass_kg: 5.0e11, label: "Today (~8.1 billion)" }
      - { time_ya: -25,    mass_kg: 6.0e11, label: "2050 projection (~9.7 billion, near-peak)" }
      - { time_ya: -75,    mass_kg: 6.5e11, label: "2100 projection (~10.4 billion)" }
    sources: [un-population, kremer-1993]

  - id: chickens
    name: Domestic chickens
    category: livestock
    color: "#d29922"
    prominence: 2
    blurb: "From a junglefowl in SE Asia ~10,000 years ago to ~33 billion birds today — by mass, the most successful land vertebrate by far."
    trajectory:
      - { time_ya: 10000, mass_kg: 1.5e4,  label: "First domestication in SE Asia (~10,000 birds)" }
      - { time_ya: 2000,  mass_kg: 1.0e8,  label: "Spread across Eurasia + Mediterranean" }
      - { time_ya: 125,   mass_kg: 1.0e9,  label: "1900 — ~500M birds, mostly backyard" }
      - { time_ya: 75,    mass_kg: 5.0e9,  label: "1950 — 3 billion, broiler genetics shipping" }
      - { time_ya: 25,    mass_kg: 2.8e10, label: "2000 — 14 billion, factory farming dominant" }
      - { time_ya: 0,     mass_kg: 7.0e10, label: "Today — ~33 billion alive at any moment" }
    sources: [fao-livestock]

  - id: cattle
    name: Cattle (Bos taurus + B. indicus)
    category: livestock
    color: "#a55ec2"
    prominence: 2
    blurb: "From aurochs domestication ~10,000 years ago to ~1 billion cattle today (~6 × 10¹¹ kg, more biomass than all wild mammals combined)."
    trajectory:
      - { time_ya: 10000, mass_kg: 1.0e7,  label: "Aurochs domestication (Anatolia + India)" }
      - { time_ya: 2000,  mass_kg: 5.0e9,  label: "Eurasia + Africa pastoral systems established" }
      - { time_ya: 125,   mass_kg: 1.0e11, label: "1900 — ~400M cattle" }
      - { time_ya: 0,     mass_kg: 6.0e11, label: "Today — ~1B cattle, ~600 kg average" }
    sources: [fao-livestock]

  - id: dogs
    name: Domestic dogs
    category: livestock
    color: "#e08a4a"
    prominence: 3
    blurb: "Domesticated from grey wolves ~30 kya — the first species we partnered with, ~20 kyr before anything else. Today ~900M dogs at ~25 kg average."
    trajectory:
      - { time_ya: 30000, mass_kg: 1.0e5,  label: "Wolves first associate with humans (Siberia / Europe)" }
      - { time_ya: 10000, mass_kg: 1.0e7,  label: "Distinct breeds emerge alongside agriculture" }
      - { time_ya: 125,   mass_kg: 1.0e9,  label: "1900 — ~50M dogs, urbanization begins pet shift" }
      - { time_ya: 0,     mass_kg: 2.3e10, label: "Today — ~900M dogs (470M owned + 430M free-ranging)" }
    sources: [fao-livestock]

  - id: honey-bees
    name: Honey bees (Apis mellifera)
    category: biology
    color: "#e6b800"
    prominence: 3
    blurb: "Beekeeping is ~9,000 years old (Egyptian sun temples). Today ~100 million managed colonies × ~50,000 bees × 0.1 g = ~5 × 10⁸ kg, plus an unknown wild population."
    trajectory:
      - { time_ya: 9000, mass_kg: 1.0e6,  label: "Earliest honey-pot evidence in N. African pottery" }
      - { time_ya: 2500, mass_kg: 1.0e7,  label: "Egyptian + Greek apiculture systematized" }
      - { time_ya: 175,  mass_kg: 5.0e7,  label: "1850 — Langstroth movable-frame hive invented" }
      - { time_ya: 0,    mass_kg: 5.0e8,  label: "Today — ~100M managed colonies; wild populations declining" }
    sources: [fao-livestock]

  - id: coral-reefs
    name: Coral reefs
    category: biology
    color: "#e08aa6"
    prominence: 3
    blurb: "Living coral total mass — the architects, not the limestone. Reefs cover <1% of ocean floor but host 25% of marine species. Down ~50% since 1980 from heat + acidification."
    trajectory:
      - { time_ya: 65e6,  mass_kg: 5.0e11, label: "Modern scleractinian reefs rebuild after K-Pg" }
      - { time_ya: 6000,  mass_kg: 8.0e11, label: "Holocene reef peak — sea-level stable, conditions ideal" }
      - { time_ya: 50,    mass_kg: 7.0e11, label: "1975 — pre-bleaching baseline, mass coring underway" }
      - { time_ya: 25,    mass_kg: 5.0e11, label: "2000 — ~30% lost to first global bleaching events" }
      - { time_ya: 0,     mass_kg: 3.5e11, label: "Today — ~50% of 1980 baseline gone" }
    sources: [iucn-cetaceans]

# ─── Cultural and informational systems ──────────────────────────────
  - id: religions
    name: World religions (adherents)
    category: people
    color: "#9b6dc7"
    prominence: 3
    blurb: "Total mass of all religious adherents (≈ adherents × 60 kg). Buddhism 500 BCE, Christianity 1 CE, Islam 600 CE — three trajectories collapsed into one because they all follow the same shape: founder, slow Anatolian/Arabian/Indian century, then exponential during periods of empire + missionary expansion."
    trajectory:
      - { time_ya: 2500, mass_kg: 6.0e6,  label: "Buddhism founded; first organized world religion" }
      - { time_ya: 2000, mass_kg: 1.0e8,  label: "Christianity emerges in Roman Judea" }
      - { time_ya: 1400, mass_kg: 1.0e10, label: "Islam founded; spreads across Arabia + N. Africa" }
      - { time_ya: 500,  mass_kg: 8.0e10, label: "Reformation + colonial exports begin" }
      - { time_ya: 125,  mass_kg: 5.0e11, label: "1900 — ~75% of humanity religiously affiliated" }
      - { time_ya: 0,    mass_kg: 4.5e11, label: "Today — ~85% affiliated; non-affiliated rising in West" }
    sources: [pew-religion]

  - id: wikipedia
    name: Wikipedia (articles)
    category: technology
    color: "#5c6e7b"
    prominence: 3
    blurb: "From zero in Jan 2001 to 60M+ articles across 300+ languages today. Mass shown is paper-equivalent: average article ≈ 4 KB ≈ 0.02 g of printed paper if you imagine printing the whole thing."
    trajectory:
      - { time_ya: 25,   mass_kg: 0.0,    label: "Jan 2001 — Jimmy Wales + Larry Sanger launch with 0 articles" }
      - { time_ya: 22,   mass_kg: 1.0e2,  label: "2003 — 100K articles, mostly English" }
      - { time_ya: 18,   mass_kg: 1.0e4,  label: "2007 — 5M articles across major languages" }
      - { time_ya: 10,   mass_kg: 5.0e4,  label: "2015 — 35M articles" }
      - { time_ya: 0,    mass_kg: 1.2e6,  label: "Today — 60M articles in 300+ languages" }
    sources: [wikimedia-stats]

  - id: smartphones
    name: Smartphones
    category: technology
    color: "#1a8fbf"
    prominence: 2
    blurb: "From the iPhone reveal in Jan 2007 to ~6.8 billion smartphones in active use today (~10¹² kg of hardware). Now the dominant computing surface for most of humanity — the largest physical mass of personal computing ever produced."
    trajectory:
      - { time_ya: 19,   mass_kg: 0.0,    label: "Jan 2007 — iPhone announced" }
      - { time_ya: 15,   mass_kg: 1.0e8,  label: "2011 — 1B smartphone subscriptions" }
      - { time_ya: 10,   mass_kg: 5.0e10, label: "2016 — 3.7B users, mobile passes desktop web" }
      - { time_ya: 5,    mass_kg: 9.0e10, label: "2021 — 6B subscriptions, COVID accelerates dependence" }
      - { time_ya: 0,    mass_kg: 1.4e12, label: "Today — ~6.8B active smartphones, ~200 g each" }
    sources: [icann-stats]

  - id: languages
    name: Spoken languages (extant)
    category: people
    color: "#aa9d3a"
    prominence: 3
    blurb: "Mass shown is speakers × 60 kg of 'language carriers'. Peak diversity ~10 kya at maybe 20,000 languages; today ~7,100 and dropping ~1 every 2 weeks. The wave-and-collapse pattern is the chart's saddest curve."
    trajectory:
      - { time_ya: 50000, mass_kg: 1.0e7,  label: "Modern syntactic language emerges" }
      - { time_ya: 10000, mass_kg: 5.0e8,  label: "~20,000 languages spoken at peak diversity" }
      - { time_ya: 500,   mass_kg: 3.0e10, label: "Colonization era — many languages start dying" }
      - { time_ya: 125,   mass_kg: 8.0e10, label: "1900 — ~10,000 languages, dominant ones standardizing via print" }
      - { time_ya: 0,     mass_kg: 4.5e11, label: "Today — ~7,100 languages, half projected gone by 2100" }
    sources: [ethnologue]

  - id: scientific-papers
    name: Scientific papers (cumulative)
    category: technology
    color: "#446a8c"
    prominence: 3
    blurb: "Royal Society 1665 to today's ~3 million new papers/year. Mass-as-paper: average 8-page paper ≈ 50 g. Cumulative ≈ 4 × 10⁹ kg of physical paper if anyone printed them all out (almost no one does anymore)."
    trajectory:
      - { time_ya: 360, mass_kg: 1.0e1,  label: "1665 — Phil. Trans. of the Royal Society launches" }
      - { time_ya: 200, mass_kg: 1.0e5,  label: "1825 — ~3,000/yr published" }
      - { time_ya: 75,  mass_kg: 5.0e7,  label: "1950 — post-war science boom begins" }
      - { time_ya: 25,  mass_kg: 5.0e8,  label: "2000 — ~1M papers/yr" }
      - { time_ya: 0,   mass_kg: 4.0e9,  label: "Today — ~3M/yr, ~80M cumulative" }
    sources: [bornmann-2015]

  - id: vaccines
    name: Vaccines administered (cumulative)
    category: technology
    color: "#3fb59a"
    prominence: 3
    blurb: "Edward Jenner's 1796 cowpox-against-smallpox experiment to today's ~16 billion COVID doses alone. Cumulative ≈ 8 × 10¹⁰ doses (mass-as-vials: ~5 g each, so ~4 × 10⁸ kg). Among the highest-leverage interventions per kilogram in history."
    trajectory:
      - { time_ya: 230, mass_kg: 1.0e-2, label: "1796 — Jenner's first cowpox inoculation" }
      - { time_ya: 130, mass_kg: 1.0e2,  label: "1896 — Pasteur's vaccine institute era" }
      - { time_ya: 75,  mass_kg: 1.0e5,  label: "1950 — polio + measles + childhood schedule" }
      - { time_ya: 25,  mass_kg: 1.0e7,  label: "2000 — global immunization programs scale" }
      - { time_ya: 0,   mass_kg: 4.0e8,  label: "Today — ~80B doses cumulative incl. COVID era" }
    sources: [our-world-in-data]

  - id: recorded-music
    name: Recorded music (cumulative)
    category: technology
    color: "#c47a4a"
    prominence: 4
    blurb: "From Edison's wax cylinder in 1877 to today's ~200M tracks on streaming platforms. Mass-as-data: average 4 MB per track, ~10⁹ kg of equivalent vinyl if pressed. The point isn't the mass but the explosion: zero to billions of songs in 150 years."
    trajectory:
      - { time_ya: 149, mass_kg: 1.0e-1, label: "1877 — Edison phonograph; first recording exists" }
      - { time_ya: 100, mass_kg: 1.0e5,  label: "1926 — electric recording; record industry forms" }
      - { time_ya: 75,  mass_kg: 1.0e7,  label: "1950 — vinyl LP era + radio scales catalog" }
      - { time_ya: 25,  mass_kg: 5.0e8,  label: "2000 — ~10M tracks digitized; Napster + iTunes" }
      - { time_ya: 0,   mass_kg: 1.0e10, label: "Today — ~200M tracks across streaming platforms" }
    sources: [riaa]

  - id: photos-taken
    name: Photographs taken globally (cumulative)
    category: technology
    color: "#7b4ec4"
    prominence: 4
    blurb: "Daguerreotype 1839 → today's ~1.5 trillion photos taken per year. Cumulative ~13 trillion photos, almost all digital. If each were a printed 4×6 (~10 g), the total would be ~10¹¹ kg — about a tenth the mass of all humans alive."
    trajectory:
      - { time_ya: 187, mass_kg: 1.0e-2, label: "1839 — Daguerre's first photograph" }
      - { time_ya: 125, mass_kg: 1.0e6,  label: "1900 — Kodak Brownie democratizes photography" }
      - { time_ya: 25,  mass_kg: 1.0e10, label: "2000 — ~80B photos/yr; digital cameras + film overlap" }
      - { time_ya: 15,  mass_kg: 3.0e10, label: "2010 — smartphones reset what 'taking a photo' means" }
      - { time_ya: 0,   mass_kg: 1.3e11, label: "Today — ~1.5T photos taken/yr; ~13T cumulative" }
    sources: [keypoint-intelligence]

  - id: bitcoin
    name: Bitcoin mining hardware
    category: technology
    color: "#e8a83a"
    prominence: 4
    blurb: "From Satoshi's CPU mining in Jan 2009 to today's ASIC fleet. ~10⁹ kg of dedicated mining hardware globally. The energy footprint (~150 TWh/yr) is what gets attention; the physical hardware mass is its own story of how fast specialized silicon can reshape a power grid."
    trajectory:
      - { time_ya: 17,  mass_kg: 1.0e1,  label: "Jan 2009 — Genesis block; CPU mining only" }
      - { time_ya: 14,  mass_kg: 1.0e3,  label: "2012 — first GPU farms" }
      - { time_ya: 12,  mass_kg: 1.0e5,  label: "2014 — ASIC era begins; Bitmain founded" }
      - { time_ya: 8,   mass_kg: 1.0e7,  label: "2018 — first big halving cycles, hardware scales" }
      - { time_ya: 0,   mass_kg: 1.0e9,  label: "Today — ~5M ASICs deployed, ~200 g each" }
    sources: [cambridge-cbeci]

  - id: wild-mammals
    name: Wild mammals
    category: biology
    color: "#7da680"
    prominence: 2
    blurb: "Once vastly more numerous than livestock; today only ~5% of mammalian biomass. The reversal happened in the last 200 years."
    trajectory:
      - { time_ya: 10000, mass_kg: 5.0e10, label: "End-Pleistocene — abundant megafauna" }
      - { time_ya: 2000,  mass_kg: 4.0e10, label: "Post-megafauna extinction baseline" }
      - { time_ya: 125,   mass_kg: 1.0e10, label: "1900 — habitat loss accelerating" }
      - { time_ya: 0,     mass_kg: 7.0e9,  label: "Today — ~5% of mammalian biomass; livestock dominates" }
    sources: [bar-on-2018-biomass]

  - id: fungi
    name: Fungi
    category: biology
    color: "#c97a2f"
    prominence: 2
    blurb: "Earth's quiet giants. ~12 Gt of carbon globally — more than animals, ~6× more than humans put together. Mostly soil fungi + mycorrhizal networks. The largest single organism known is a 9 km² honey fungus mat in Oregon."
    trajectory:
      - { time_ya: 1.0e9,  mass_kg: 1.0e12, label: "Fungi diverge from animals" }
      - { time_ya: 470e6,  mass_kg: 1.0e13, label: "Mycorrhizal partnerships help plants colonize land" }
      - { time_ya: 350e6,  mass_kg: 5.0e13, label: "Carboniferous coal forests — fungi can't yet decompose lignin, coal piles up" }
      - { time_ya: 250e6,  mass_kg: 2.0e13, label: "End-Permian fungal spike — fungi feast on dying ecosystems" }
      - { time_ya: 0,      mass_kg: 2.4e13, label: "Today — ~12 Gt C, 90% in soil + mycorrhizae" }
    sources: [bar-on-2018-biomass]

# ─── Planetary-scale signals ─────────────────────────────────────────
  - id: atmospheric-co2
    name: Atmospheric CO₂
    category: planetary
    color: "#5c8aa6"
    prominence: 2
    blurb: "Total mass of CO₂ in the atmosphere. Pre-industrial baseline 280 ppm ≈ 2.2 × 10¹⁵ kg; today ~425 ppm ≈ 3.3 × 10¹⁵ kg. The vertical line on the right side of 'now' is the Industrial Revolution made physical."
    trajectory:
      - { time_ya: 800e3, mass_kg: 1.4e15, label: "Last glacial maximum (~180 ppm)" }
      - { time_ya: 11700, mass_kg: 2.2e15, label: "Holocene baseline (~280 ppm) — stable for 10,000 yrs" }
      - { time_ya: 175,   mass_kg: 2.2e15, label: "1850 — Industrial Revolution begins (~285 ppm)" }
      - { time_ya: 75,    mass_kg: 2.5e15, label: "1950 — fossil-fuel era (~310 ppm)" }
      - { time_ya: 25,    mass_kg: 2.9e15, label: "2000 — ~370 ppm, climate science consensus solidifies" }
      - { time_ya: 0,     mass_kg: 3.3e15, label: "Today — ~425 ppm, +50% above baseline" }
      - { time_ya: -75,   mass_kg: 4.5e15, label: "2100 — high-emissions scenario (~600 ppm)" }
    sources: [noaa-co2, ipcc-ar6]

  - id: polar-ice
    name: Polar ice (Antarctic + Greenland)
    category: planetary
    color: "#a8c8e0"
    prominence: 2
    blurb: "Combined mass of the two big ice sheets. Antarctica holds ~2.65 × 10¹⁹ kg, Greenland ~2.7 × 10¹⁸ kg. Both are losing mass — Greenland accelerating fast since 2000, Antarctica catching up. The trajectory tilts down on the right."
    trajectory:
      - { time_ya: 22000, mass_kg: 4.0e19, label: "Last Glacial Maximum — ice sheets cover Northern Eur. + N. America" }
      - { time_ya: 11700, mass_kg: 3.0e19, label: "Holocene begins, sheets retreat to today's poles" }
      - { time_ya: 175,   mass_kg: 2.95e19, label: "1850 — pre-industrial baseline" }
      - { time_ya: 25,    mass_kg: 2.93e19, label: "2000 — losses now measurable from satellites" }
      - { time_ya: 0,     mass_kg: 2.92e19, label: "Today — losing ~5 × 10¹⁴ kg/yr combined" }
      - { time_ya: -75,   mass_kg: 2.85e19, label: "2100 — high-emissions projection" }
    sources: [imbie-2024]

  - id: plastics
    name: Plastics produced (cumulative)
    category: human-built
    color: "#d76a92"
    prominence: 2
    blurb: "Cumulative mass of all plastic ever manufactured. From zero in 1950 to ~9 × 10¹² kg today. Of that, ~6 × 10¹² kg is now waste (landfills, oceans, microplastics in living tissue). Possibly the cleanest 'humans changed the planet' signal on the chart."
    trajectory:
      - { time_ya: 75,   mass_kg: 2.0e9,  label: "1950 — ~2 Mt produced/yr, mostly Bakelite + early polymers" }
      - { time_ya: 50,   mass_kg: 1.5e11, label: "1975 — petrochemicals scale up" }
      - { time_ya: 25,   mass_kg: 2.5e12, label: "2000 — ~225 Mt/yr production rate" }
      - { time_ya: 0,    mass_kg: 9.0e12, label: "Today — ~9 Gt cumulative; ~6 Gt is now waste" }
      - { time_ya: -25,  mass_kg: 2.0e13, label: "2050 — projected if production trajectory continues" }
    sources: [geyer-2017-plastics]

# ─── Human-built systems ─────────────────────────────────────────────
  - id: cities
    name: Cities (urban built environment)
    category: human-built
    color: "#7b8fa1"
    prominence: 2
    blurb: "Total mass of buildings, roads, infrastructure in human settlements. Today ≈ 1.1 × 10¹⁵ kg — same order as the entire biosphere."
    trajectory:
      - { time_ya: 10000, mass_kg: 1.0e8,  label: "Çatalhöyük, Jericho — ~10,000 inhabitants" }
      - { time_ya: 5000,  mass_kg: 1.0e11, label: "Bronze Age cities (Uruk, Mohenjo-daro)" }
      - { time_ya: 2000,  mass_kg: 1.0e13, label: "Roman empire — ~1M in Rome alone" }
      - { time_ya: 125,   mass_kg: 1.0e14, label: "1900 — first megacities, 13% urban" }
      - { time_ya: 25,    mass_kg: 5.0e14, label: "2000 — 47% urban" }
      - { time_ya: 0,     mass_kg: 1.1e15, label: "Today — 57% urban, urban mass ≈ biosphere mass" }
    sources: [krausmann-2017-stocks]

  - id: books
    name: Books printed
    category: human-built
    color: "#b03a36"
    prominence: 3
