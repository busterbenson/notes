# Universe — object dataset
#
# Every entry has:
#   id            stable slug, never rename
#   name          display name
#   category      compact-object | star | planet | asteroid | moon | galaxy |
#                 cluster | particle | nucleus | atom | macromolecule | virus |
#                 organism | structure | cosmic-event | epoch
#   mass_kg       mass in kilograms
#   radius_m      characteristic size in meters
#   density_kg_m3 mean density (computed or measured)
#   color_band    nuclear | atomic | dark-matter | radiation | planck | quantum
#   shape         circle | square | diamond | cross | asterisk | star
#   color         hex string (matches Ianni Fig. 2 convention)
#   formation
#     time_ya     time before present in years (negative = future)
#     epoch       descriptive era label
#   evolution     optional list of {time_ya, density_kg_m3, label} for objects whose
#                 density changes over time (the Universe trace, dying stars)
#   sources       list of citation tags (defined in _data/universe/sources.yml)
#   blurb         one-line description for tooltips
#
# Mass/density values cross-checked against NASA NSSDC Planetary Fact Sheets
# (https://nssdc.gsfc.nasa.gov/planetary/factsheet/), Particle Data Group
# https://pdg.lbl.gov, Planck Collaboration 2020 cosmological parameters
# (Aghanim et al. 2020, A&A 641 A6), and Ianni, Mannarelli, Rossi 2022.

objects:

