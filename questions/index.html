  {d:"Buster",c:"Self",q:"How do you define success? How do you define failure? How might success be scary? How might failure be okay?"},
  {d:"WNRS",c:"Connection",q:"Have you ever told someone I love you but didn't mean it? If so, why?"},
  {d:"WNRS",c:"Connection",q:"What's your mother's name? If she's still alive, what do you think she is doing right now? And the thing you admire most about her?"},
  {d:"Buster",c:"Family",q:"What's your father's name? If he's still alive, what do you think he is doing right now? And the thing you admire most about him?"},
  {d:"Buster",c:"Family",q:"What's something you got from your parents that they didn't get from theirs?"},
  {d:"Buster",c:"Family",q:"What's something good that your parents had in their lives but that for whatever reason you didn't have?"},
  {d:"Buster",c:"Self",q:"On a scale of 1-10: How hungry are you right now? How sleepy are you? How badly do you need to go to the bathroom?"},
  {d:"WNRS",c:"Connection",q:"If you have, when was the moment you realized you weren't invincible?"},
  {d:"Buster",c:"Family",q:"Can you remember the moment you realized your parents were not all-powerful?"},
  {d:"Buster",c:"Self",q:"What is the secret to living the best life in as few words as possible?"},
  {d:"Buster",c:"World",q:"What is a common path for happiness in today's world that you believe is a dead end? When did you realize that this was the case?"},
  {d:"Buster",c:"Self",q:"What do you think you could work on (or are working on) that would make you a better person? How can the people in this room help you with that?"},
  {d:"WNRS",c:"Connection",q:"If you could get to know someone in your life on a deeper level, who would it be and why?"},
  {d:"Buster",c:"Hypothetical",q:"If you could swap bodies with anyone who would it be and why?"},
  {d:"Buster",c:"Self",q:"If you were to commit to a better life, right in this moment, what would a better life be?"},
  {d:"Buster",c:"Hypothetical",q:"If you had to pick a recipe on your tombstone, which recipe would it be?"}
];

// Pick from all categories or a single one. Each pool keeps its own shuffled
// cycle, persisted in localStorage, so every question in the pool comes up
// before any repeats — across page loads and offline sessions.
const KEY = 'questions-state-v2';
const ALL = 'All';

const CATS = (() => {
  const m = new Map();
  QUESTIONS.forEach((item, i) => {
    if (!item.c) return;
    if (!m.has(item.c)) m.set(item.c, []);
    m.get(item.c).push(i);
  });
  return m;
})();

function poolFor(cat) {
  return cat === ALL ? QUESTIONS.map((_, i) => i) : (CATS.get(cat) || []);
}

function newCycle(cat) {
  const order = poolFor(cat).slice();
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  return { order, pos: 0 };
}

let state = (() => {
  try {
    const s = JSON.parse(localStorage.getItem(KEY));
    if (s && typeof s === 'object' && s.cycles && typeof s.cycles === 'object') {
      if (s.cat !== ALL && !CATS.has(s.cat)) s.cat = ALL;
      return s;
    }
  } catch (e) {}
  return { cat: ALL, cycles: {} };
})();

function cycle() {
  const pool = poolFor(state.cat);
  let c = state.cycles[state.cat];
  const valid = c && Array.isArray(c.order) && c.order.length === pool.length &&
    c.order.every((i) => pool.includes(i)) &&
    Number.isInteger(c.pos) && c.pos >= 0 && c.pos < c.order.length;
  if (!valid) {
    c = newCycle(state.cat);
    state.cycles[state.cat] = c;
  }
  return c;
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {}
}

const chipEl = document.getElementById('chip');
const qEl = document.getElementById('question');
const countEl = document.getElementById('count');
const hintEl = document.getElementById('hint');
const filterEl = document.getElementById('filter');

(function buildFilter() {
  const opts = [[ALL, QUESTIONS.length]];
  [...CATS.keys()].sort().forEach((c) => opts.push([c, CATS.get(c).length]));
  for (const [name, n] of opts) {
    const o = document.createElement('option');
    o.value = name;
    o.textContent = (name === ALL ? 'All categories' : name) + ' · ' + n;
    filterEl.appendChild(o);
  }
  filterEl.value = state.cat;
})();

function render() {
  const c = cycle();
  const item = QUESTIONS[c.order[c.pos]];
  // The chip repeats the category, which is only informative when drawing
  // from all categories at once.
  chipEl.textContent = item.c || '';
  chipEl.style.display = (state.cat === ALL && item.c) ? '' : 'none';
  qEl.textContent = item.q;
  countEl.textContent = (c.pos + 1) + ' / ' + c.order.length;
}

function show(step) {
  qEl.classList.add('fading');
  setTimeout(() => {
    const c = cycle();
    if (step > 0) {
      c.pos++;
      if (c.pos >= c.order.length) state.cycles[state.cat] = newCycle(state.cat);
    } else if (c.pos > 0) {
      c.pos--;
    }
    save();
    render();
    qEl.classList.remove('fading');
    hintEl.style.visibility = 'hidden';
  }, 180);
}

document.getElementById('stage').addEventListener('click', () => show(1));
document.getElementById('prev').addEventListener('click', (e) => { e.stopPropagation(); show(-1); });
filterEl.addEventListener('click', (e) => e.stopPropagation());
filterEl.addEventListener('change', (e) => {
  e.stopPropagation();
  state.cat = filterEl.value;
  save();
  qEl.classList.add('fading');
  setTimeout(() => { render(); qEl.classList.remove('fading'); }, 180);
});
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'ArrowRight' || e.key === 'Enter') { e.preventDefault(); show(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); show(-1); }
});

render();

// Offline support: the service worker caches this page (and the icons) on first
// visit, so the URL keeps working with no connection at all.
const netEl = document.getElementById('net');
const dotEl = document.getElementById('dot');
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then((reg) => {
    const markReady = () => { dotEl.classList.add('ready'); netEl.textContent = 'works offline'; };
    if (reg.active) markReady();
    else reg.addEventListener('updatefound', () => {
      const w = reg.installing;
      if (w) w.addEventListener('statechange', () => { if (w.state === 'activated') markReady(); });
    });

    // iOS home-screen apps resume from the app switcher without a fresh
    // navigation, so a long-lived page would never see new deploys. Check for
    // an updated service worker whenever the app returns to the foreground...
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && navigator.onLine) {
        reg.update().catch(() => {});
      }
    });
  }).catch(() => { netEl.textContent = 'online only'; });

  // ...and when one takes over, reload once to pick up the new page. Guarded
  // to the already-controlled case so the very first visit doesn't reload.
  const hadController = !!navigator.serviceWorker.controller;
  let reloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!hadController || reloaded) return;
    reloaded = true;
    location.reload();
  });
} else {
  netEl.textContent = 'online only';
}
</script>
